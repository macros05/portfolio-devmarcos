<header class="fixed top-0 left-0 w-full z-50 transition-all duration-500 ease-in-out"
        [class.bg-gray-900/80]="isScrolled"
[class.backdrop-blur-md]="isScrolled"
[class.border-b]="isScrolled"
[class.border-gray-800]="isScrolled">

<nav class="max-w-[1400px] mx-auto px-6 md:px-16 lg:px-24 py-5 flex justify-between items-center">

  <a href="#inicio" class="text-2xl font-bold text-gray-100 hover:text-blue-500 transition-colors">

  </a>

  <ul class="hidden md:flex gap-10 text-sm font-mono tracking-widest uppercase">
    <li><a href="#inicio" class="text-gray-300 hover:text-blue-400 transition-colors">{{ t().nav.inicio }}</a></li>
    <li><a href="#about" class="text-gray-300 hover:text-blue-400 transition-colors">{{ t().nav.about }}</a></li>
    <li><a href="#proyectos" class="text-gray-300 hover:text-blue-400 transition-colors">{{ t().nav.projects }}</a></li>
    <li><a href="#contacto" class="text-gray-300 hover:text-blue-400 transition-colors">{{ t().nav.contact }}</a></li>
  </ul>

  <!-- Botón ES / EN -->
  <button
    (click)="langService.toggle()"
    class="font-mono text-sm tracking-widest uppercase px-4 py-2 rounded border border-gray-700
         text-gray-300 hover:border-blue-500 hover:text-blue-400 transition-all duration-300 flex items-center gap-2">
    <span>{{ langService.lang() === 'es' ? '🇪🇸' : '🇬🇧' }}</span>
    <span>{{ langService.lang() === 'es' ? 'ES' : 'EN' }}</span>
  </button>

</nav>
</header>
