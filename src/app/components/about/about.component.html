<section id="about" class="px-6 md:px-16 lg:px-24 w-full pt-12">

  <h2 fadeIn class="text-4xl font-bold text-gray-100 mb-20 border-b border-gray-800 pb-6 max-w-7xl mx-auto">
    {{ t().about.title }}
  </h2>

  <div class="flex flex-col lg:flex-row gap-20 lg:gap-32 w-full max-w-[1400px] mx-auto items-center">

    <div fadeIn class="w-full lg:w-1/2 space-y-10">
      <p class="text-gray-300 text-xl md:text-2xl leading-relaxed">
        {{ t().about.bio }}
      </p>

      <a [href]="lang() === 'en' ? '/assets/CV-Marcos-Morales-EN.pdf' : '/assets/CV-Marcos-Morales-ES.pdf'"
         [download]="lang() === 'en' ? 'CV-Marcos-Morales-EN.pdf' : 'CV-Marcos-Morales-ES.pdf'"
         class="inline-block border border-blue-500 text-blue-500 hover:bg-blue-500 hover:text-white transition-colors duration-300 px-8 py-4 rounded font-mono text-lg mt-4">
        {{ t().about.downloadCv }}
      </a>
    </div>

    <div fadeIn class="w-full lg:w-1/2">
      <h3 class="text-3xl font-semibold text-gray-100 mb-10 lg:text-center">{{ t().about.techTitle }}</h3>

      <div class="grid grid-cols-2 sm:grid-cols-3 gap-6 md:gap-8">
        @for (tech of techIcons; track tech.name) {
          <a fadeIn [href]="tech.url" target="_blank" rel="noopener noreferrer"
             class="flex flex-col items-center justify-center gap-4 p-8 bg-gray-800/40 backdrop-blur-sm rounded-xl border border-gray-700 hover:border-blue-500 hover:bg-gray-800 transition-all duration-300 group">

            <img [src]="tech.icon" [alt]="tech.name" class="w-16 h-16 opacity-70 group-hover:opacity-100 transition-opacity">

            <span class="text-gray-200 text-base font-mono tracking-wide text-center">
              {{ tech.name }}
            </span>

          </a>
        }
      </div>
    </div>

  </div>
</section>
